<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function () {
        const basePath = '%BASE_URL%';
        const redirect = sessionStorage.getItem('redirect');
        if (redirect) {
          sessionStorage.removeItem('redirect');
          if (
            redirect !== basePath + '/' &&
            redirect !== basePath + '/index.html'
          ) {
            window.history.pushState(null, '', redirect);
          }
        }
      })();
    </script>
    <link rel="icon" type="image/png" href="%BASE_URL%/images/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grant Running</title>
    <meta name="description" content="Grant's running activities" />
    <link rel="canonical" href="https://kiddeke.github.io/running_page" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Grant Running" />
    <meta property="og:description" content="Grant's running activities" />
    <meta property="og:url" content="https://kiddeke.github.io/running_page" />
    <meta property="og:image" content="https://github.com/Kiddeke.png" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Grant Running" />
    <meta name="twitter:description" content="Grant's running activities" />
    <meta name="twitter:image" content="https://github.com/Kiddeke.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
