name: Fetch Catholic Readings

# Pulls fresh USCCB Mass readings once a week and commits them to the repo,
# rather than scraping on every push — frequent scraping was getting the
# runner's IP rate-limited (403s) by USCCB, breaking the readings links.
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 6' # Saturday 00:00 UTC

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install httpx beautifulsoup4

      - name: Fetch Catholic readings
        run: python scripts/fetch-readings.py

      - name: Commit and push
        run: |
          git config --local user.email 'action@github.com'
          git config --local user.name 'GitHub Action'
          git add public/readings
          git commit -m 'Update Catholic mass readings' || echo 'nothing to commit'
          git push || echo 'nothing to push'
