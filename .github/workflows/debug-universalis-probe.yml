name: Debug Universalis Probe

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Probe Universalis endpoints
        run: |
          for url in \
            "https://universalis.com/US/20260710/Mass0.js" \
            "https://universalis.com/US/20260710/jsonpmass.js" \
            "https://universalis.com/USA/20260710/jsonpmass.js" \
            "https://universalis.com/europe.brit/20260710/jsonpmass.js" \
            "https://universalis.com/20260710/jsonpmass.js" ; do
            echo "=== $url ==="
            curl -s -o /tmp/resp.txt -w "HTTP %{http_code}\n" -A "Mozilla/5.0" "$url" || echo "curl failed"
            head -c 500 /tmp/resp.txt
            echo
            echo
          done
